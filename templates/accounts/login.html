{% extends 'store/base.html' %}
{% load static %}

{% block title %}Login - STYLEORA{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="container">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your account</p>
            </div>
            
            <form method="POST" class="auth-form">
                {% csrf_token %}
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                
                <button type="submit" class="btn-submit">Sign In</button>
            </form>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="{% url 'register' %}">Create one</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_css %}
<style>
.auth-page {
    padding: 100px 0;
    min-height: 70vh;
    display: flex;
    align-items: center;
}
.auth-container {
    max-width: 450px;
    margin: 0 auto;
    background: var(--white);
    padding: 50px;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    border: 1px solid var(--border);
    animation: scaleIn 0.5s ease-out;
}
.auth-header {
    text-align: center;
    margin-bottom: 40px;
}
.auth-header h1 {
    font-size: 32px;
    margin-bottom: 10px;
}
.auth-header p {
    color: var(--text-light);
}
.form-group {
    margin-bottom: 20px;
}
.form-group label {
    display: block;
    font-weight: 500;
    margin-bottom: 8px;
    font-size: 14px;
}
.form-group input {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    transition: all 0.3s;
    background: var(--light);
}
.form-group input:focus {
    outline: none;
    border-color: var(--secondary);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(201, 169, 98, 0.1);
}
.btn-submit {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--secondary), var(--accent));
    color: var(--white);
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.4s;
    position: relative;
    overflow: hidden;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.btn-submit::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.5s;
}
.btn-submit:hover::before {
    left: 100%;
}
.btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(201, 169, 98, 0.4);
}
.auth-footer {
    text-align: center;
    margin-top: 25px;
}
.auth-footer a {
    color: var(--secondary);
    font-weight: 600;
    transition: all 0.3s;
}
.auth-footer a:hover {
    color: var(--accent);
}
@media (max-width: 768px) {
    .auth-page { padding: 60px 0; }
    .auth-container { padding: 30px 20px; }
    .auth-header h1 { font-size: 28px; }
}
@media (max-width: 480px) {
    .auth-header h1 { font-size: 24px; }
    .auth-container { padding: 20px 15px; }
}
</style>
{% endblock %}
