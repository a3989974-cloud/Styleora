{% extends 'store/base.html' %}
{% load static %}

{% block title %}My Profile - STYLEORA{% endblock %}

{% block content %}
<section class="profile-page">
    <div class="container">
        <h1>My Profile</h1>
        
        <div class="profile-layout">
            <nav class="profile-nav">
                <a href="{% url 'profile' %}" class="active">Profile Settings</a>
                <a href="{% url 'order_history' %}">My Orders</a>
                <a href="{% url 'wishlist' %}">My Wishlist</a>
                <a href="{% url 'logout' %}">Logout</a>
            </nav>
            
            <div class="profile-content">
                <form method="POST" class="profile-form">
                    {% csrf_token %}
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" name="first_name" value="{{ user.first_name }}">
                        </div>
                        
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" name="last_name" value="{{ user.last_name }}">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" value="{{ user.email }}" disabled>
                        <small>Contact admin to change email</small>
                    </div>
                    
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" value="{{ user.username }}" disabled>
                    </div>
                    
                    <button type="submit" class="btn-save">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_css %}
<style>
.profile-page {
    padding: 60px 0;
    animation: fadeIn 0.5s ease-out;
}
.profile-page h1 {
    font-size: 42px;
    margin-bottom: 40px;
    animation: fadeInUp 0.5s ease-out;
}
.profile-page h1::after {
    content: '';
    display: block;
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, var(--secondary), var(--accent));
    margin-top: 15px;
    border-radius: 2px;
}
.profile-layout {
    display: grid;
    grid-template-columns: 250px 1fr;
    gap: 40px;
}
.profile-nav {
    background: var(--white);
    padding: 20px;
    border-radius: 12px;
    height: fit-content;
    border: 1px solid var(--border);
    position: sticky;
    top: 120px;
}
.profile-nav a {
    display: block;
    padding: 14px 20px;
    border-radius: 8px;
    margin-bottom: 8px;
    transition: all 0.3s;
    font-weight: 500;
}
.profile-nav a:hover {
    background: rgba(201, 169, 98, 0.08);
    color: var(--secondary);
    transform: translateX(5px);
}
.profile-nav a.active {
    background: linear-gradient(135deg, var(--secondary), var(--accent));
    color: var(--white);
    box-shadow: 0 4px 12px rgba(201, 169, 98, 0.3);
}
.profile-content {
    background: var(--white);
    padding: 40px;
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}
.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}
.form-group {
    margin-bottom: 25px;
}
.form-group label {
    display: block;
    font-weight: 500;
    margin-bottom: 10px;
    font-size: 14px;
}
.form-group input {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    transition: all 0.3s;
    background: var(--light);
}
.form-group input:focus {
    outline: none;
    border-color: var(--secondary);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(201, 169, 98, 0.1);
}
.form-group input:disabled {
    background: var(--light);
    color: var(--text-light);
}
.form-group small {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 5px;
    display: block;
}
.btn-save {
    padding: 16px 40px;
    background: linear-gradient(135deg, var(--secondary), var(--accent));
    color: var(--white);
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.4s;
    position: relative;
    overflow: hidden;
}
.btn-save::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.5s;
}
.btn-save:hover::before {
    left: 100%;
}
.btn-save:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(201, 169, 98, 0.4);
}
@media (max-width: 768px) {
    .profile-page { padding: 40px 0; }
    .profile-page h1 { font-size: 28px; margin-bottom: 25px; }
    .profile-layout { grid-template-columns: 1fr; gap: 20px; }
    .profile-nav { position: static; display: flex; flex-wrap: wrap; gap: 8px; }
    .profile-nav a { flex: 1; text-align: center; padding: 10px 15px; font-size: 13px; min-width: 120px; }
    .profile-content { padding: 20px; }
    .form-row { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
    .profile-page h1 { font-size: 24px; }
    .profile-nav { flex-direction: column; }
    .profile-nav a { width: 100%; }
}
</style>
{% endblock %}
