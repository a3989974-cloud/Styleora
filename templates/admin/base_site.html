{% extends "admin/base.html" %}
{% load i18n static %}

{% block title %}{% if subtitle %}{{ subtitle }} | {% endif %}{{ title }} | STYLEORA Admin{% endblock %}

{% block branding %}
<h1 id="site-name">
  <a href="{% url 'admin:index' %}">
    <img src="{% static 'styleora-logo.png' %}" alt="STYLEORA" style="height:28px;width:auto;margin-right:8px;vertical-align:middle;">
    <span class="brand-text">STYLEORA</span>
    <span class="brand-label">Admin</span>
  </a>
</h1>
{% endblock %}

{% block nav-global %}{% endblock %}

{% block extrastyle %}
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap');

/* ── Design System ── (Off-white / Dark Gold) */
:root {
  --gold-50: #fdf8ed;
  --gold-100: #f9edcc;
  --gold-200: #f2d98a;
  --gold-300: #e8c547;
  --gold-400: #d4af37;
  --gold-500: #c9a962;
  --gold-600: #b8942e;
  --gold-700: #9a7a26;
  --gold-dark: #7a6318;

  --ink-900: #0a0a0a;
  --ink-800: #111111;
  --ink-700: #1a1a1a;
  --ink-600: #222222;
  --ink-500: #2a2a2a;
  --ink-400: #333333;

  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;

  --green-400: #34d399;
  --green-600: #059669;
  --red-400: #f87171;
  --red-600: #dc2626;
  --blue-400: #60a5fa;
  --blue-600: #2563eb;
  --purple-400: #a78bfa;
  --purple-600: #7c3aed;
  --pink-400: #f472b6;
  --pink-600: #db2777;
  --teal-400: #2dd4bf;
  --teal-600: #0d9488;
  --orange-400: #fb923c;
  --orange-600: #ea580c;

  --body-bg: #f5f2eb;
  --body-fg: var(--gold-dark);
  --dark-panel: #ffffff;
  --border-color: #b8942e;
  --hover-bg: #f0ede6;
  --link-fg: var(--gold-dark);
  --link-hover-fg: #5c4b12;
  --button-bg: var(--gold-dark);
  --button-fg: #ffffff;
  --button-hover-bg: #6d520f;
  --delete-btn: var(--red-600);
}

/* ── Base Reset ── */
*, *::before, *::after {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif !important;
}

body {
  background: var(--body-bg);
  color: var(--body-fg) !important;
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

#container, #content, #content-main {
  color: var(--body-fg) !important;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: #e5e0d6; }
::-webkit-scrollbar-thumb { background: #c4b998; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #b8942e; }

/* ── Header ── */
#header {
  background: linear-gradient(135deg, var(--ink-900) 0%, #0d0d1a 50%, var(--ink-900) 100%);
  border-bottom: 1px solid var(--border-color);
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 1px 0 rgba(184,148,46,0.15);
  position: sticky;
  top: 0;
  z-index: 100;
}

#branding h1 {
  margin: 0;
  font-size: 0;
}
#branding h1 a {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  font-size: 0;
}
#branding h1 a img {
  height: 28px;
  width: auto;
  border-radius: 4px;
}
.brand-text {
  font-family: 'Playfair Display', serif !important;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #ffffff;
}
.brand-dot {
  font-family: 'Playfair Display', serif !important;
  font-size: 22px;
  color: #d4af37;
}
.brand-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #d4c5a0;
  background: rgba(255,255,255,0.06);
  padding: 3px 10px;
  border-radius: 100px;
  margin-left: 4px;
  border: 1px solid rgba(255,255,255,0.1);
}
.brand-icon {
  font-size: 20px;
  color: var(--gold-500);
}

/* ── User Tools ── */
#user-tools {
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 20px;
  color: #d4af37;
}
#user-tools strong {
  font-weight: 600;
  color: #e8c547;
  font-size: 14px;
}
#user-tools a {
  color: #d4af37 !important;
  font-weight: 500;
  font-size: 13px;
  transition: color 0.2s;
  text-decoration: none;
}
#user-tools a:hover {
  color: #e8c547 !important;
}

#logout-form button {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 7px 16px;
  color: #d4af37;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
#logout-form button:hover {
  background: rgba(212,175,55,0.1);
  border-color: #d4af37;
  color: #e8c547;
}

/* ── Breadcrumbs ── */
.breadcrumbs {
  background: #e8e2d8;
  color: var(--body-fg) !important;
  padding: 10px 32px;
  font-size: 13px;
  border-bottom: 1px solid var(--border-color);
  letter-spacing: 0.2px;
}
.breadcrumbs a {
  color: var(--gold-dark) !important;
  text-decoration: none;
  font-weight: 600;
}
.breadcrumbs a:hover {
  color: #5c4b12 !important;
}

/* ── Module / Card ── */
.module {
  background: #ffffff;
  border: 1px solid var(--border-color);
  border-radius: 14px;
  box-shadow: 0 1px 4px rgba(122,99,24,0.08), 0 1px 2px rgba(122,99,24,0.04);
  margin-bottom: 28px;
  overflow: hidden;
  transition: box-shadow 0.25s, transform 0.2s;
  position: relative;
}
.module::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold-dark), var(--gold-500), var(--purple-400), var(--blue-400));
  opacity: 0.7;
  z-index: 1;
}
.module:hover {
  box-shadow: 0 4px 16px rgba(122,99,24,0.12), 0 2px 4px rgba(122,99,24,0.06);
  transform: translateY(-1px);
}

.module h2,
.module caption,
.inline-group h2 {
  background: #f5f2eb;
  color: var(--gold-dark) !important;
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 16px 22px;
  margin: 0;
  border-bottom: 1px solid var(--border-color);
  position: relative;
}
.module h2::after,
.module caption::after,
.inline-group h2::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 22px;
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, var(--gold-dark), transparent);
  border-radius: 2px;
}

/* Colorful module variants by position */
.dashboard .module:nth-child(1)::before {
  background: linear-gradient(90deg, var(--gold-dark), var(--gold-500), transparent);
}
.dashboard .module:nth-child(2)::before {
  background: linear-gradient(90deg, var(--purple-400), var(--pink-400), transparent);
}
.dashboard .module:nth-child(3)::before {
  background: linear-gradient(90deg, var(--blue-400), var(--teal-400), transparent);
}
.dashboard .module:nth-child(4)::before {
  background: linear-gradient(90deg, var(--green-400), var(--teal-400), transparent);
}
.dashboard .module:nth-child(5)::before {
  background: linear-gradient(90deg, var(--orange-400), var(--gold-500), transparent);
}

.dashboard .module {
  margin-bottom: 28px;
}

/* ── App list on dashboard ── */
.dashboard .module table {
  background: transparent;
}
.dashboard .module table th {
  width: 100%;
  padding: 14px 20px;
  font-size: 14px;
  font-weight: 500;
}
.dashboard .module table th a {
  color: var(--gold-dark) !important;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
}
.dashboard .module table th a:hover {
  color: #5c4b12;
}
.dashboard .module table td {
  padding: 14px 20px;
  white-space: nowrap;
  font-size: 14px;
  color: var(--body-fg) !important;
}
.dashboard .module table td a {
  color: var(--body-fg) !important;
  font-weight: 500;
  padding: 4px 12px;
  border-radius: 6px;
  background: #f5f2eb;
  transition: all 0.2s;
}
.dashboard .module table td a:hover {
  background: #e8e2d8;
  color: #5c4b12 !important;
}
.dashboard .module table td a.addlink {
  background: rgba(5,150,105,0.1);
  color: #059669 !important;
}
.dashboard .module table td a.addlink:hover {
  background: rgba(5,150,105,0.18);
  color: #047857 !important;
}
.dashboard .module table td a.changelink {
  background: rgba(37,99,235,0.1);
  color: #2563eb !important;
}
.dashboard .module table td a.changelink:hover {
  background: rgba(37,99,235,0.18);
  color: #1d4ed8 !important;
}
.dashboard .module table td:first-child {
  color: var(--gold-dark) !important;
  font-weight: 400;
}

/* ── Changelist / Table ── */
#changelist {
  background: transparent;
}
#changelist table {
  border-collapse: separate;
  border-spacing: 0;
  width: 100%;
}
#changelist thead th {
  background: var(--gold-dark);
  color: #ffffff !important;
  font-weight: 700;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  padding: 15px 14px;
  border-bottom: 2px solid var(--gold-dark);
  white-space: nowrap;
}
#changelist thead th a {
  color: #ffffff !important;
}
#changelist thead th.sorted {
  background: #6d520f;
  color: #ffffff !important;
}
#changelist thead th.sorted a {
  color: #ffffff !important;
}
#changelist thead th .text a:focus,
#changelist thead th .text a:hover {
  color: #e8c547;
}
#changelist tbody tr {
  background: #ffffff;
  transition: all 0.15s;
}
#changelist tbody tr:hover {
  background: #f5f2eb;
}
#changelist tbody tr:nth-child(even) {
  background: #faf8f5;
}
#changelist tbody tr:nth-child(even):hover {
  background: #f5f2eb;
}
#changelist tbody td {
  padding: 13px 14px;
  border-bottom: 1px solid var(--border-color);
  color: var(--body-fg) !important;
  font-size: 14px;
  vertical-align: middle;
}
#changelist tbody td a {
  color: var(--gold-dark) !important;
  font-weight: 500;
}
#changelist tbody td a:hover {
  color: #5c4b12 !important;
}
#changelist .selected {
  background: #f0ede6 !important;
}
#changelist .selected a {
  color: var(--gold-dark);
}

/* ── Action checkbox ── */
.action-checkbox-column {
  width: 30px;
}
.action-checkbox {
  accent-color: var(--gold-dark);
  width: 16px;
  height: 16px;
  cursor: pointer;
}

/* ── Links ── */
a:link, a:visited {
  color: var(--link-fg);
  text-decoration: none;
  transition: color 0.2s;
}
a:hover {
  color: var(--link-hover-fg);
}
a.section:link, a.section:visited {
  color: var(--gold-dark) !important;
  font-weight: 600;
}

/* ── Buttons ── */
.button, input[type=submit], input[type=button], .submit-row input, a.button {
  background: var(--gold-dark) !important;
  color: #ffffff !important;
  font-weight: 600 !important;
  font-size: 13px !important;
  padding: 9px 22px !important;
  border: none !important;
  border-radius: 8px !important;
  cursor: pointer !important;
  transition: all 0.2s ease !important;
  text-shadow: none !important;
  box-shadow: none !important;
  letter-spacing: 0.2px;
}
.button:hover, input[type=submit]:hover, .submit-row input:hover, a.button:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(122,99,24,0.25) !important;
}
.button:active, input[type=submit]:active {
  transform: translateY(0);
}

.button.default, input[type=submit].default, .submit-row input.default {
  background: var(--gold-dark) !important;
  font-weight: 700 !important;
}

/* ── Submit Row ── */
.submit-row {
  background: #ffffff;
  border: 1px solid var(--border-color);
  border-radius: 14px;
  padding: 18px 22px;
  margin: 28px 0;
  display: flex;
  align-items: center;
  gap: 12px;
  position: relative;
}
.submit-row::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold-dark), var(--gold-500));
  opacity: 0.5;
  border-radius: 14px 14px 0 0;
}
.submit-row a.deletelink {
  background: var(--delete-btn) !important;
  color: #ffffff !important;
  border-radius: 8px;
  padding: 9px 22px;
  font-weight: 600;
  font-size: 13px;
  transition: all 0.2s;
  text-decoration: none;
  margin-left: auto;
}
.submit-row a.deletelink:hover {
  background: #b91c1c !important;
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(220,38,38,0.3);
}

/* ── Form Elements ── */
.form-row {
  border-bottom: 1px solid var(--border-color);
  padding: 18px 0;
}
.form-row label {
  font-weight: 700;
  color: var(--gold-dark) !important;
  font-size: 14px;
  min-width: 160px;
}
.form-row .field-box label {
  color: var(--body-fg) !important;
  font-weight: 600;
}
.form-row input,
.form-row textarea,
.form-row select {
  background: #ffffff;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 11px 14px;
  color: #333333 !important;
  font-size: 14px;
  font-weight: 400;
  transition: all 0.2s;
  width: auto;
  min-width: 250px;
}
.form-row input::placeholder,
.form-row textarea::placeholder {
  color: #9ca3af;
}
.form-row input:focus,
.form-row textarea:focus,
.form-row select:focus {
  border-color: var(--gold-dark);
  box-shadow: 0 0 0 3px rgba(122,99,24,0.15);
  outline: none;
  background: #ffffff;
}
.form-row input[type=checkbox] {
  min-width: auto;
  accent-color: var(--gold-dark);
  width: 18px;
  height: 18px;
}
.form-row input[type=checkbox] + label {
  font-weight: 500;
  color: var(--body-fg);
}
.form-row select option {
  background: #ffffff;
  color: #333333;
  padding: 6px;
}
.form-row .readonly {
  color: #6b7280;
  font-size: 14px;
  padding: 8px 0;
}

/* ── Filters ── */
#changelist-filter {
  background: #ffffff;
  border: 1px solid var(--border-color);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 20px;
  position: relative;
}
#changelist-filter::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold-dark), var(--gold-500));
  opacity: 0.5;
  border-radius: 14px 14px 0 0;
}
#changelist-filter h2 {
  background: transparent;
  color: var(--gold-dark) !important;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 0 0 12px 0;
  border-bottom: 1px solid var(--border-color);
  margin-bottom: 14px;
  font-weight: 700;
}
#changelist-filter h2::after {
  display: none;
}
#changelist-filter h3 {
  font-size: 12px;
  font-weight: 700;
  color: var(--gold-dark) !important;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin: 16px 0 8px;
}
#changelist-filter ul {
  margin: 0;
  padding: 0;
}
#changelist-filter li {
  list-style: none;
  margin: 2px 0;
}
#changelist-filter a {
  color: var(--body-fg) !important;
  font-size: 13px;
  padding: 6px 10px;
  border-radius: 8px;
  display: block;
  transition: all 0.15s;
}
#changelist-filter a:hover {
  background: #f5f2eb;
  color: #5c4b12 !important;
}
#changelist-filter li.selected a {
  background: #f0ede6;
  color: var(--gold-dark) !important;
  font-weight: 600;
  border-left: 3px solid var(--gold-dark);
}

/* ── Paginator ── */
.paginator {
  background: #ffffff;
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 14px 20px;
  margin: 24px 0;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  color: var(--body-fg);
}
.paginator a:link, .paginator a:visited {
  background: #f5f2eb;
  color: var(--body-fg);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 6px 14px;
  font-weight: 600;
  font-size: 14px;
  transition: all 0.2s;
}
.paginator a:hover {
  background: var(--gold-dark);
  color: #ffffff;
  border-color: var(--gold-dark);
  text-decoration: none;
}
.paginator .this-page {
  background: var(--gold-dark);
  color: #ffffff;
  border-radius: 8px;
  padding: 6px 14px;
  font-weight: 700;
  font-size: 13px;
}

/* ── Sidebar ── */
#nav-sidebar {
  background: #e8e2d8;
  border-right: 1px solid var(--border-color);
  padding: 16px 0;
}
#nav-sidebar .current-app .section:link,
#nav-sidebar .current-app .section:visited {
  color: var(--gold-dark);
  font-weight: 700;
  font-size: 14px;
}
#nav-sidebar a:link, #nav-sidebar a:visited {
  color: var(--body-fg) !important;
  padding: 10px 20px;
  border-radius: 0;
  display: block;
  transition: all 0.15s;
  font-size: 14px;
  font-weight: 500;
  border-left: 2px solid transparent;
}
#nav-sidebar a:hover {
  background: #d6cfc0;
  color: #5c4b12 !important;
  border-left-color: var(--gold-dark);
  text-decoration: none;
}
#nav-sidebar .current-model a {
  background: #d6cfc0;
  color: var(--gold-dark) !important;
  border-left-color: var(--gold-dark);
  font-weight: 500;
}

/* ── Object Tools ── */
.object-tools {
  margin-top: 0;
  margin-bottom: 16px;
}
.object-tools a:link, .object-tools a:visited {
  background: var(--gold-dark) !important;
  color: #ffffff !important;
  border-radius: 8px;
  padding: 8px 18px;
  font-weight: 600;
  font-size: 12px;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}
.object-tools a:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(122,99,24,0.25);
}

/* ── Dashboard ── */
.dashboard .module table th {
  width: 100%;
  padding: 14px 20px;
  font-size: 14px;
}
.dashboard .module table th a {
  color: var(--gold-dark);
  font-weight: 600;
}
.dashboard .module table td {
  padding: 14px 20px;
  white-space: nowrap;
  font-size: 14px;
}
.dashboard .module table td a {
  color: var(--body-fg);
  font-weight: 500;
  padding: 4px 12px;
  border-radius: 6px;
  background: #f5f2eb;
  transition: all 0.2s;
}
.dashboard #content { padding: 24px 32px; }
.dashboard #content-main { float: none; width: 100%; }
.dashboard #content-related { float: none; width: 100%; margin-right: 0; }

/* ── Recent Actions ── */
#content-related .module h2 {
  font-size: 13px;
}
#content-related .actionlist {
  padding: 12px 20px;
}
#content-related .actionlist li {
  padding: 6px 0;
  font-size: 13px;
  color: var(--body-fg);
}
#content-related .actionlist li a {
  color: var(--body-fg);
}
#content-related .actionlist li a:hover {
  color: #5c4b12;
}

/* ── Aligned Forms ── */
.aligned label {
  padding: 8px 0;
  color: var(--gold-dark) !important;
  font-weight: 600 !important;
  font-size: 14px;
}
.aligned .form-row input {
  min-width: 300px;
}

/* ── Help Text ── */
.help, p.help, .form-row .help {
  color: #8a7a5a !important;
  font-size: 13px;
  margin-top: 4px;
}

/* ── Error / Success / Warning Messages ── */
.errornote {
  background: rgba(220,38,38,0.08);
  border: 1px solid rgba(220,38,38,0.2);
  color: #b91c1c;
  border-radius: 10px;
  padding: 14px 20px;
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 16px;
}
.errorlist {
  color: #b91c1c;
  font-size: 13px;
  margin: 4px 0 0;
  padding: 0;
  font-weight: 500;
}
.errorlist li {
  list-style: none;
}

.messagelist li {
